general {
    disable_loading_bar = true
    hide_cursor = false
}

background {
    path = ~/Pictures/Backgrounds/1397098.png
    blur_passes = 2
    blur_size = 4
    noise = 0.01
    contrast = 1.2
    brightness = 0.8
    vibrancy = 0.2
}


label {
    text = cmd[update:1000] date +"%H:"
    font_size = 110
    font_family = JetBrainsMono Black
    color = rgba(255, 255, 255, 0.95)

    position = -90, 200
    halign = center
    valign = center
}

# Minutos
label {
    text = cmd[update:1000] date +"%M"
    font_size = 110
    font_family = JetBrainsMono Black
    color = rgba(245, 245, 245, 0.75)

    position = 100, 200
    halign = center
    valign = center
}


# Día
label {
    text = cmd[update:1000] date +"%A,"
    font_size = 22
    font_family = Sans Bold Oblique
    color = rgba(255, 255, 255, 0.90)

    position = 0, 100
    halign = center
    valign = center
}

# Fecha
label {
    text = cmd[update:1000] date +"%b %d"
    font_size = 22
    font_family = Sans SemiBold Oblique
    color = rgba(255, 255, 255, 0.75)

    position = 0, 65
    halign = center
    valign = center
}

input-field {
    size = 250, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true

    inner_color = rgba(35, 35, 35, 0.9)
    outer_color = rgba(100, 120, 114, 0.5)
    font_color = rgba(255, 255, 255, 0.9)
    font_family = JetBrainsMono Medium

    fade_on_empty = false
    placeholder_text = <span foreground="##ffffffaa">Enter Password...</span>

    position = 0, -400
    halign = center
    valign = center
}
